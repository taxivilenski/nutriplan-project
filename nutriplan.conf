# nginx/nutriplan.conf
# ────────────────────────────────────────────────────────────
# Nginx reverse proxy для NutriPlan API
# HTTPS через Let's Encrypt (Certbot)
#
# Требования:
#   - Домен настроен (A-запись → IP сервера)
#   - Certbot установлен: apt install certbot python3-certbot-nginx
#   - Сертификат получен: certbot --nginx -d your-domain.com
#
# После certbot --nginx эти блоки ssl_certificate будут заполнены автоматически.
# ────────────────────────────────────────────────────────────

# HTTP → HTTPS редирект (certbot добавляет автоматически)
server {
    listen 80;
    server_name YOUR_DOMAIN.COM;

    # Let's Encrypt challenge (не трогать)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Всё остальное — редирект на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS + reverse proxy
server {
    listen 443 ssl;
    server_name YOUR_DOMAIN.COM;

    # ── TLS-сертификат (заполняется certbot) ─────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.COM/privkey.pem;

    # ── TLS-настройки (Mozilla Modern config) ────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout       1d;
    ssl_session_cache         shared:MozSSL:10m;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # ── Заголовки безопасности ────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options    "nosniff"          always;
    add_header X-Frame-Options           "DENY"             always;
    add_header X-XSS-Protection          "1; mode=block"    always;

    # ── Лимит размера тела запроса (профиль + список продуктов) ──
    client_max_body_size 1m;

    # ── Proxy к Flask/Gunicorn ────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Тайм-ауты: анализ может занять до 5-10с при холодном старте
        proxy_connect_timeout  15s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;
    }

    # ── Health check — без логов ──────────────────────────────
    location /health {
        proxy_pass         http://127.0.0.1:5000/health;
        access_log         off;
    }
}
